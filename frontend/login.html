<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QMS - Portal Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 position-relative">
    
    <!-- Wallpaper Overlay for background effects -->
    <div class="auth-bg-overlay"></div>

    <div class="container py-5 animate-fade-in-up">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                
                <!-- Main Glass Card -->
                <div class="glass-panel p-4 p-md-5" id="authCard">
                    
                    <!-- Header -->
                    <div class="text-center mb-4">
                        <div class="nav-brand-text justify-content-center mb-2 fs-1">
                            <i class="fas fa-layer-group"></i> QMS
                        </div>
                        <h4 class="fw-bold" id="authTitle">Welcome Back</h4>
                        <p class="text-muted small" id="authSubtitle">Sign in to book queue tokens or manage your counters</p>
                    </div>

                    <!-- Login Form -->
                    <form id="loginForm" novalidate>
                        <!-- Email Field -->
                        <div class="glass-input-group">
                            <label for="email" class="form-label-custom">Email Address</label>
                            <input type="email" id="email" class="glass-input" placeholder="name@company.com" required>
                            <i class="fas fa-envelope"></i>
                            <div class="invalid-feedback text-danger mt-1 small">Please enter a valid email address.</div>
                        </div>

                        <!-- Password Field -->
                        <div class="glass-input-group">
                            <div class="d-flex justify-content-between">
                                <label for="password" class="form-label-custom">Password</label>
                                <a href="#" class="text-decoration-none small text-primary" id="btnShowForgot">Forgot?</a>
                            </div>
                            <input type="password" id="password" class="glass-input" placeholder="••••••••" required>
                            <i class="fas fa-lock"></i>
                            <div class="invalid-feedback text-danger mt-1 small">Password must be at least 4 characters long.</div>
                        </div>

                        <!-- Role Selector -->
                        <div class="mb-4">
                            <label class="form-label-custom">Access Role</label>
                            <div class="row g-2">
                                <div class="col-6">
                                    <input type="radio" class="btn-check" name="role" id="roleCustomer" value="customer" checked>
                                    <label class="btn glass-btn w-100 justify-content-center" for="roleCustomer">
                                        <i class="fas fa-user-circle me-1"></i> Customer
                                    </label>
                                </div>
                                <div class="col-6">
                                    <input type="radio" class="btn-check" name="role" id="roleAdmin" value="admin">
                                    <label class="btn glass-btn w-100 justify-content-center" for="roleAdmin">
                                        <i class="fas fa-user-shield me-1"></i> Staff/Admin
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Submit Buttons -->
                        <button type="submit" class="glass-btn glass-btn-primary w-100 py-3 mb-3">
                            Sign In <i class="fas fa-sign-in-alt ms-2"></i>
                        </button>
                    </form>

                    <!-- Forgot Password Form (Hidden by default, animated in) -->
                    <form id="forgotForm" class="d-none" novalidate>
                        <div class="glass-input-group">
                            <label for="forgotEmail" class="form-label-custom">Register Email</label>
                            <input type="email" id="forgotEmail" class="glass-input" placeholder="name@company.com" required>
                            <i class="fas fa-envelope"></i>
                            <div class="invalid-feedback text-danger mt-1 small">Please enter your registered email.</div>
                        </div>

                        <button type="submit" class="glass-btn glass-btn-accent w-100 py-3 mb-3">
                            Send Reset Instructions <i class="fas fa-paper-plane ms-2"></i>
                        </button>
                        
                        <button type="button" class="glass-btn w-100 py-3 text-center" id="btnBackToLogin">
                            Back to Sign In
                        </button>
                    </form>

                    <!-- Footer Link -->
                    <div class="text-center mt-4 border-top pt-3 border-secondary border-opacity-10" id="authFooter">
                        <span class="text-muted small">New to QMS? </span>
                        <a href="register.html" class="text-decoration-none fw-bold text-primary small">Create Account</a>
                    </div>
                </div>

                <!-- Theme / Landing Control Options -->
                <div class="d-flex justify-content-between align-items-center mt-4 px-3">
                    <a href="index.html" class="glass-btn py-2 px-3 small text-muted">
                        <i class="fas fa-arrow-left me-1"></i> Public Terminal
                    </a>
                    <button class="theme-switch-btn" title="Toggle Theme">
                        <i class="fas fa-sun"></i>
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- Core Javascript Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
